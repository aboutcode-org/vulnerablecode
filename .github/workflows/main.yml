name: run tests

on: [push, pull_request]


env:
  DB_NAME: vulnerablecode
  DB_USER: vulnerablecode
  DB_PASSWORD: vulnerablecode

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      

      - name: Install dependencies
        run: make dev envfile
# Disable codestyle checks until we have cleaned up the code
#      - name: Validate code format
#        run: make check

      - name: Run tests
        run: make test
        env:
          GH_TOKEN: 1 
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          VULNERABLECODE_DB_NAME: ${{ env.DB_NAME }}
          VULNERABLECODE_DB_USER: ${{ env.DB_USER }}
          VULNERABLECODE_DB_PASSWORD: ${{ env.DB_PASSWORD }}
